<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE COMMANDER - FOCUSED</title>
    <style>
        /* Fix for checkbox visibility in dark/black themes */
input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border: 2px solid var(--accent);
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.05);
    cursor: pointer;
    position: relative;
    vertical-align: middle;
}

input[type="checkbox"]:checked {
    background: var(--accent);
}

input[type="checkbox"]:checked::after {
    content: '✔';
    position: absolute;
    color: #000;
    font-size: 14px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-weight: bold;
}

        :root {
            --bg-img: url('https://images.unsplash.com/photo-1464802686167-b939a6910659?q=80&w=1920');
            --text: #38bdf8;
            --accent: #38bdf8;
            --card: rgba(15, 23, 42, 0.75);
            --border: rgba(56, 189, 248, 0.3);
            --glow: rgba(56, 189, 248, 0.5);
        }

        [data-theme="purple"] {
            --bg-img: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=1920');
            --text: #c084fc;
            --accent: #c084fc;
            --card: rgba(20, 10, 40, 0.8);
            --border: rgba(192, 132, 252, 0.3);
            --glow: rgba(192, 132, 252, 0.5);
        }

        [data-theme="dark"] {
            --bg-img: url('https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?q=80&w=1920'); 
            --text: #f8fafc;
            --accent: #f8fafc;
            --card: rgba(0, 0, 0, 0.85);
            --border: rgba(255, 255, 255, 0.2);
            --glow: rgba(255, 255, 255, 0.3);
        }

        body {
            margin: 0; color: var(--text); font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px 20px 120px 20px; transition: all 0.6s ease;
            background: #000; overflow-x: hidden;
        }

        .bg-overlay {
            position: fixed; inset: 0; background-image: var(--bg-img);
            background-size: cover; background-position: center; z-index: -2;
            transition: background-image 1s ease; filter: brightness(0.4);
        }

        .container { width: 100%; max-width: 600px; z-index: 10; }

        .view-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .view-btn { 
            flex: 1; padding: 12px; background: var(--card); border: 1px solid var(--border);
            color: var(--text); border-radius: 12px; cursor: pointer; font-weight: bold;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .view-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--glow); }

        /* Pomodoro Card - Removed Pulse */
        .pomo-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 40px; border-radius: 35px; text-align: center;
            backdrop-filter: blur(25px); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: fadeIn 0.8s ease;
        }

        .timer-display {
            font-size: 85px; font-weight: 900; font-family: 'Courier New', monospace;
            text-shadow: 0 0 30px var(--glow); margin: 15px 0;
            display: flex; justify-content: center; align-items: center;
        }

        .time-input {
            background: transparent; border: none; color: inherit;
            font-family: inherit; font-size: inherit; font-weight: inherit;
            width: 110px; text-align: center; cursor: pointer;
            border-bottom: 2px solid transparent; transition: 0.3s;
        }
        .time-input:focus { outline: none; border-bottom: 2px solid var(--accent); color: #fff; }
        .time-input:hover { background: rgba(255,255,255,0.05); border-radius: 10px; }

        .pomo-controls { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .control-btn {
            padding: 14px 30px; border-radius: 50px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.05); color: var(--text);
            cursor: pointer; font-weight: bold; transition: 0.3s; letter-spacing: 1px;
        }
        .control-btn:hover { background: var(--accent); color: #000; transform: scale(1.05); }

        /* Syllabus Styles */
        .countdown-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 25px; text-align: center; margin-bottom: 25px; backdrop-filter: blur(20px); }
        .days-num { font-size: 60px; font-weight: 900; text-shadow: 0 0 20px var(--glow); }
        .bar-bg { height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #bar-fill { height: 100%; width: 0%; background: var(--accent); transition: width 1s ease; }
        .nav-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .nav-btn.active { background: var(--accent); color: #000; }
        .main-card { background: var(--card); border: 1px solid var(--border); border-radius: 25px; padding: 15px 20px; min-height: 300px; backdrop-filter: blur(15px); }
        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); animation: itemIn 0.4s ease forwards; }
        .list-item.done { opacity: 0.2; filter: grayscale(1); }

        /* Taskbar */
        .taskbar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 30px; border-radius: 100px; display: flex; align-items: center; gap: 20px; z-index: 1000;
        }
        .dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.3); }

        @keyframes itemIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body data-theme="dark">

    <div class="bg-overlay"></div>

    <div class="container">
        <div class="view-nav">
            <button class="view-btn active" id="v-syl" onclick="switchView('syllabus')">MISSION LOG</button>
            <button class="view-btn" id="v-pomo" onclick="switchView('pomodoro')">DEEP WORK</button>
        </div>

        <div id="view-syllabus">
            <div class="countdown-card">
                <span class="days-num" id="days-val">--</span>
                <div style="font-size: 10px; letter-spacing: 4px; opacity: 0.6; margin-top: 5px;">DAYS TO APRIL 5TH</div>
            </div>

            <div class="bar-bg"><div id="bar-fill"></div></div>

            <div class="nav-group">
                <button class="nav-btn active" id="btn-Physics" onclick="setSub('Physics')">PHY</button>
                <button class="nav-btn" id="btn-Chemistry" onclick="setSub('Chemistry')">CHEM</button>
                <button class="nav-btn" id="btn-Maths" onclick="setSub('Maths')">MATH</button>
            </div>
            <div class="main-card" id="chapter-list"></div>
        </div>

        <div id="view-pomodoro" style="display: none;">
            <div class="pomo-card" id="pomo-container">
                <div id="pomo-status" style="font-size: 12px; letter-spacing: 5px; opacity: 0.6;">STASIS_READY</div>
                <div class="timer-display">
                    <input type="number" id="m-input" class="time-input" value="25" min="0" max="99" onchange="syncTimer()">
                    <span>:</span>
                    <input type="number" id="s-input" class="time-input" value="00" min="0" max="59" onchange="syncTimer()">
                </div>
                <div class="pomo-controls">
                    <button class="control-btn" id="pomo-start" onclick="toggleTimer()">LAUNCH</button>
                    <button class="control-btn" onclick="resetTimer()">ABORT</button>
                </div>
                <p style="font-size: 10px; margin-top: 20px; opacity: 0.4;">CLICK NUMBERS TO EDIT TIME</p>
            </div>
        </div>
    </div>

    <div class="taskbar">
        <div style="display:flex; gap:12px;">
            <div class="dot" style="background:#38bdf8;" onclick="setTheme('cyan')"></div>
            <div class="dot" style="background:#c084fc;" onclick="setTheme('purple')"></div>
            <div class="dot" style="background:#ffffff;" onclick="setTheme('dark')"></div>
        </div>
        <div style="width:1px; height:20px; background:rgba(255,255,255,0.2);"></div>
        <span id="clock" style="font-size:14px; font-weight:900; font-family: monospace;">00:00</span>
    </div>

    <script>
        const syllabus = {
            Physics: ["Units & Measurements", "Kinematics", "Laws of Motion", "Work, Energy & Power", "Rotational Motion", "Gravitation", "Matter Properties", "Thermodynamics", "Kinetic Theory", "Oscillations & Waves", "Electrostatics", "Current Electricity", "Magnetic Effects", "EMI & AC", "EM Waves", "Optics", "Dual Nature", "Atoms & Nuclei", "Electronic Devices", "Experimental Skills"],
            Chemistry: ["Basic Concepts", "Atomic Structure", "Chemical Bonding", "Thermodynamics", "Solutions", "Equilibrium", "Redox", "Chemical Kinetics", "Classification", "p-Block Elements", "d & f Block", "Coordination Compounds", "Purification", "Organic Principles", "Hydrocarbons", "Halogens", "Oxygen Compounds", "Nitrogen Compounds", "Biomolecules", "Practical Chemistry"],
            Maths: ["Sets & Relations", "Complex Numbers", "Matrices & Determinants", "Permutations & Combinations", "Binomial Theorem", "Sequence & Series", "Limit & Continuity", "Integral Calculus", "Differential Equations", "Co-ordinate Geometry", "3D Geometry", "Vector Algebra", "Statistics", "Trigonometry"]
        };

        let state = JSON.parse(localStorage.getItem('jee_final_focused')) || { done: {} };
        let currentSub = 'Physics';

        function switchView(view) {
            document.getElementById('view-syllabus').style.display = view === 'syllabus' ? 'block' : 'none';
            document.getElementById('view-pomodoro').style.display = view === 'pomodoro' ? 'block' : 'none';
            document.getElementById('v-syl').classList.toggle('active', view === 'syllabus');
            document.getElementById('v-pomo').classList.toggle('active', view === 'pomodoro');
        }

        function setSub(s) {
            currentSub = s;
            ['Physics', 'Chemistry', 'Maths'].forEach(n => document.getElementById('btn-'+n).classList.toggle('active', n===s));
            render();
        }

        function render() {
            const list = document.getElementById('chapter-list');
            list.innerHTML = '';
            syllabus[currentSub].forEach((ch, i) => {
                const isDone = state.done[ch] || false;
                const div = document.createElement('div');
                div.className = `list-item ${isDone ? 'done' : ''}`;
                div.style.animationDelay = `${i * 0.05}s`;
                div.innerHTML = `<span>${ch}</span><input type="checkbox" ${isDone?'checked':''} onchange="toggleCh('${ch}')" style="width:20px;height:20px;accent-color:var(--accent);">`;
                list.appendChild(div);
            });
            updateStats();
        }

        function toggleCh(ch) {
            state.done[ch] = !state.done[ch];
            localStorage.setItem('jee_final_focused', JSON.stringify(state));
            render();
        }

        function updateStats() {
            let total = 0, done = 0;
            Object.keys(syllabus).forEach(s => syllabus[s].forEach(ch => { total++; if(state.done[ch]) done++; }));
            document.getElementById('bar-fill').style.width = Math.round((done/total)*100) + '%';
        }

        let timerInterval;
        let isRunning = false;
        let totalSeconds = 1500;

        function syncTimer() {
            if (isRunning) return;
            const m = parseInt(document.getElementById('m-input').value) || 0;
            const s = parseInt(document.getElementById('s-input').value) || 0;
            totalSeconds = (m * 60) + s;
        }

        function toggleTimer() {
            const btn = document.getElementById('pomo-start');
            const mInput = document.getElementById('m-input');
            const sInput = document.getElementById('s-input');

            if (isRunning) {
                clearInterval(timerInterval);
                btn.innerText = "LAUNCH";
                document.getElementById('pomo-status').innerText = "STASIS_READY";
                mInput.disabled = false;
                sInput.disabled = false;
            } else {
                syncTimer();
                if (totalSeconds <= 0) return;
                timerInterval = setInterval(updateTimer, 1000);
                btn.innerText = "PAUSE";
                document.getElementById('pomo-status').innerText = "WARP_DRIVE_ACTIVE";
                mInput.disabled = true;
                sInput.disabled = true;
            }
            isRunning = !isRunning;
        }

        function updateTimer() {
            if (totalSeconds <= 0) {
                clearInterval(timerInterval);
                alert("Deep Work Session Ended.");
                resetTimer();
                return;
            }
            totalSeconds--;
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            document.getElementById('m-input').value = mins;
            document.getElementById('s-input').value = secs < 10 ? "0" + secs : secs;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            totalSeconds = 1500;
            document.getElementById('m-input').value = 25;
            document.getElementById('s-input').value = "00";
            document.getElementById('m-input').disabled = false;
            document.getElementById('s-input').disabled = false;
            document.getElementById('pomo-start').innerText = "LAUNCH";
            document.getElementById('pomo-status').innerText = "STASIS_READY";
        }

        function updateCountdown() {
            const days = Math.ceil((new Date('2026-04-05') - new Date()) / 86400000);
            document.getElementById('days-val').innerText = days > 0 ? days : 0;
        }
        function setTheme(t) { document.body.setAttribute('data-theme', t); }
        function clock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', hour12:false }); }

        setInterval(clock, 1000); clock();
        updateCountdown();
        setSub('Physics');
    </script>
</body>
</html>
